<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindEase AI Companion | Professional Mental Health Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-gradient: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body { 
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .chat-window {
            height: calc(100vh - 280px);
            scrollbar-width: thin;
            scrollbar-color: #10b981 transparent;
        }

        .chat-window::-webkit-scrollbar { width: 5px; }
        .chat-window::-webkit-scrollbar-track { background: transparent; }
        .chat-window::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }

        .typing-dot {
            width: 8px;
            height: 8px;
            margin: 0 2px;
            background-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1.0); opacity: 1; }
        }

        .markdown-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .markdown-content p { margin-bottom: 0.5rem; }
        .markdown-content h3 { font-weight: 700; font-size: 1.1rem; margin-top: 0.8rem; color: #064e3b; }

        .breathe-pulse {
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 0.8; }
        }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MarkdownMessage = ({ content, isHuman }) => {
            const getHtml = () => {
                const rawHtml = marked.parse(content, { breaks: true });
                return { __html: rawHtml };
            };
            return (
                <div 
                    className={`text-sm md:text-base leading-relaxed markdown-content ${isHuman ? 'text-white' : 'text-slate-800'}`}
                    dangerouslySetInnerHTML={getHtml()} 
                />
            );
        };

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const [backendStatus, setBackendStatus] = useState("checking");
            const [mood, setMood] = useState(null);
            const [showBreathing, setShowBreathing] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const chatEndRef = useRef(null);

            const affirmations = [
                "You are capable of amazing things.",
                "It's okay to take a break and breathe.",
                "Your feelings are valid and important.",
                "You are stronger than you think.",
                "Today is a fresh start."
            ];
            const [dailyAffirmation] = useState(affirmations[Math.floor(Math.random() * affirmations.length)]);

            const scrollToBottom = () => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => { scrollToBottom(); }, [messages, loading]);

            useEffect(() => {
                const checkBackend = async () => {
                    try {
                        const res = await fetch("http://localhost:8000/", { method: "GET" });
                        if (res.ok) setBackendStatus("online");
                        else setBackendStatus("offline");
                    } catch (e) {
                        setBackendStatus("offline");
                    }
                };
                checkBackend();
            }, []);

            const handleSend = async (customMsg = null) => {
                const text = customMsg || input;
                if (!text.trim() || loading) return;

                const userMsg = { role: "human", content: text };
                setMessages(prev => [...prev, userMsg]);
                setInput("");
                setLoading(true);

                try {
                    const response = await fetch("http://localhost:8000/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: text,
                            history: messages,
                            mood: mood
                        })
                    });

                    const data = await response.json();
                    if (data.answer) {
                        setMessages(prev => [...prev, { role: "assistant", content: data.answer }]);
                    } else if (data.error) {
                        if (data.error.includes("429") || data.error.includes("RESOURCE_EXHAUSTED")) {
                            setMessages(prev => [...prev, { 
                                role: "assistant", 
                                content: "⚠️ **Free Tier Rate Limit Reached.** Please wait about 30 seconds before your next question. This is a limitation of the free Google AI plan." 
                            }]);
                        } else {
                            setMessages(prev => [...prev, { role: "assistant", content: "Error: " + data.error }]);
                        }
                    }
                } catch (error) {
                    setMessages(prev => [...prev, { 
                        role: "assistant", 
                        content: "**Connection Error:** Backend is unavailable. Check if 'app.py' is running." 
                    }]);
                } finally {
                    setLoading(false);
                }
            };

            const startListening = () => {
                if (!('webkitSpeechRecognition' in window)) {
                    alert("Speech recognition not supported in this browser.");
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.onstart = () => setIsListening(true);
                recognition.onend = () => setIsListening(false);
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    setInput(transcript);
                };
                recognition.start();
            };

            const exportChat = () => {
                const chatText = messages.map(m => `${m.role === 'human' ? 'User' : 'MindEase'}: ${m.content}`).join('\n\n');
                const blob = new Blob([chatText], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'MindEase_Conversation.txt';
                a.click();
            };

            const moods = [
                { emoji: '😊', label: 'Happy' },
                { emoji: '😔', label: 'Sad' },
                { emoji: '😰', label: 'Anxious' },
                { emoji: '😡', label: 'Angry' },
                { emoji: '😴', label: 'Tired' }
            ];

            return (
                <div className="max-w-4xl mx-auto h-screen flex flex-col p-4 md:p-8">
                    {/* Header */}
                    <header className="flex items-center justify-between mb-4 glass-card p-5 rounded-3xl">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center text-white shadow-lg rotate-3">
                                <i className="fas fa-leaf text-2xl"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold text-emerald-900 tracking-tight">MindEase</h1>
                                <div className="flex items-center gap-2">
                                    <span className={`w-2 h-2 rounded-full ${backendStatus === 'online' ? 'bg-emerald-400' : 'bg-red-400'}`}></span>
                                    <span className="text-xs text-emerald-700 font-semibold uppercase tracking-wider">
                                        {backendStatus === 'online' ? 'Secure & Encrypted' : 'Connecting to Server...'}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowBreathing(true)} className="w-10 h-10 rounded-xl bg-white/50 text-emerald-600 hover:bg-emerald-100 transition-all flex items-center justify-center shadow-sm" title="Breathe">
                                <i className="fas fa-wind"></i>
                            </button>
                            <button onClick={exportChat} className="w-10 h-10 rounded-xl bg-white/50 text-emerald-600 hover:bg-emerald-100 transition-all flex items-center justify-center shadow-sm" title="Export Chat">
                                <i className="fas fa-download"></i>
                            </button>
                            <button onClick={() => setMessages([])} className="w-10 h-10 rounded-xl bg-red-50 text-red-400 hover:bg-red-100 transition-all flex items-center justify-center shadow-sm" title="Reset">
                                <i className="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </header>

                    {/* Affirmation Card */}
                    <div className="mb-4 glass-card p-3 rounded-2xl border-l-4 border-emerald-500 flex items-center gap-3 fade-in">
                        <i className="fas fa-sparkles text-emerald-500"></i>
                        <p className="text-sm text-emerald-800 font-medium italic">"{dailyAffirmation}"</p>
                    </div>

                    {/* Mood Selector */}
                    <div className="flex gap-3 mb-4 justify-center">
                        {moods.map(m => (
                            <button 
                                key={m.label}
                                onClick={() => { setMood(m.label); handleSend(`I'm feeling ${m.label.toLowerCase()} today.`); }}
                                className={`px-4 py-2 rounded-2xl glass-card transition-all hover:scale-105 flex items-center gap-2 ${mood === m.label ? 'ring-2 ring-emerald-500 bg-white' : 'opacity-80'}`}
                            >
                                <span className="text-lg">{m.emoji}</span>
                                <span className="text-xs font-bold text-emerald-900">{m.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Chat Area */}
                    <div className="flex-1 glass-card rounded-[2.5rem] shadow-xl overflow-hidden flex flex-col border border-white/40">
                        <div className="chat-window flex-1 overflow-y-auto p-6 space-y-6">
                            {messages.length === 0 && (
                                <div className="h-full flex flex-col items-center justify-center text-center space-y-6 opacity-80 fade-in">
                                    <div className="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center">
                                        <i className="fas fa-comment-medical text-4xl text-emerald-500"></i>
                                    </div>
                                    <div className="max-w-sm">
                                        <h2 className="text-2xl font-bold text-emerald-900 mb-2">Welcome to MindEase</h2>
                                        <p className="text-emerald-800 leading-relaxed font-light">Your professional mental health companion. Share your thoughts or select yours current mood above to begin.</p>
                                    </div>
                                </div>
                            )}

                            {messages.map((msg, i) => (
                                <div key={i} className={`flex ${msg.role === 'human' ? 'justify-end' : 'justify-start'} fade-in`}>
                                    <div className={`flex flex-col max-w-[85%] ${msg.role === 'human' ? 'items-end' : 'items-start'}`}>
                                        <div className={`px-5 py-4 rounded-3xl shadow-sm ${
                                            msg.role === 'human' 
                                            ? 'bg-emerald-600 text-white rounded-tr-none' 
                                            : 'bg-white/90 text-slate-800 rounded-tl-none border border-emerald-50'
                                        }`}>
                                            <MarkdownMessage content={msg.content} isHuman={msg.role === 'human'} />
                                        </div>
                                        <span className="text-[10px] text-emerald-900/40 mt-1 font-bold uppercase tracking-tighter px-2">
                                            {msg.role === 'human' ? 'You' : 'MindEase AI'}
                                        </span>
                                    </div>
                                </div>
                            ))}

                            {loading && (
                                <div className="flex justify-start">
                                    <div className="bg-white/90 px-6 py-4 rounded-3xl rounded-tl-none border border-emerald-50 shadow-sm">
                                        <div className="typing-dot"></div>
                                        <div className="typing-dot"></div>
                                        <div className="typing-dot"></div>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        {/* Input Area */}
                        <div className="p-6 bg-white/40 backdrop-blur-md border-t border-white/50">
                            <div className="relative flex items-center gap-3">
                                <button 
                                    onClick={startListening}
                                    className={`w-12 h-12 rounded-full flex items-center justify-center transition-all ${isListening ? 'bg-red-500 text-white animate-pulse' : 'bg-emerald-100 text-emerald-600 hover:bg-emerald-200'}`}
                                >
                                    <i className={`fas ${isListening ? 'fa-microphone' : 'fa-microphone-alt'}`}></i>
                                </button>
                                <input 
                                    type="text" 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                                    placeholder="Tell me what's on your mind..."
                                    className="flex-1 pl-6 pr-14 py-4 rounded-3xl border border-emerald-200/50 focus:outline-none focus:ring-4 focus:ring-emerald-200/30 shadow-inner bg-white/90 text-emerald-900 transition-all"
                                />
                                <button 
                                    onClick={() => handleSend()}
                                    disabled={!input.trim() || loading}
                                    className={`absolute right-2 w-10 h-10 rounded-2xl flex items-center justify-center transition-all ${
                                        input.trim() && !loading 
                                        ? 'bg-emerald-600 text-white shadow-lg' 
                                        : 'bg-slate-200 text-slate-400'
                                    }`}
                                >
                                    <i className={`fas ${loading ? 'fa-spinner fa-spin' : 'fa-paper-plane'}`}></i>
                                </button>
                            </div>
                            <p className="text-[10px] text-center text-emerald-900/40 mt-4 font-semibold uppercase tracking-widest">
                                Emergency Support: Call 988 (USA) or local helplines.
                            </p>
                        </div>
                    </div>

                    {/* Breathing Tool Overlay */}
                    {showBreathing && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 backdrop-blur-xl bg-emerald-900/20 fade-in">
                            <div className="glass-card max-w-sm w-full p-8 rounded-[3rem] text-center space-y-8 border-2 border-white/60">
                                <h3 className="text-2xl font-bold text-emerald-900">Take a Moment</h3>
                                <div className="relative h-48 w-48 mx-auto flex items-center justify-center">
                                    <div className="absolute inset-0 bg-emerald-400 rounded-full breathe-pulse"></div>
                                    <div className="z-10 text-emerald-900 font-bold text-lg select-none">Breathe In...</div>
                                </div>
                                <p className="text-emerald-800 font-medium">Follow the circle to regulate your heart rate.</p>
                                <button 
                                    onClick={() => setShowBreathing(false)}
                                    className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg hover:bg-emerald-700 transition-all"
                                >
                                    I Feel Better
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
